<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>오늘의 루틴</title>
<link rel="stylesheet" href="../shared/common.css" />
<link rel="manifest" href="../manifest.json" />
<style>
  .slot-title { margin: 18px 0 8px; color: #666; font-size: 15px; font-weight: 600; }

  .gacha-overlay {
    position: fixed; inset: 0; background: rgba(20,24,35,0.75);
    display: none; align-items: center; justify-content: center; z-index: 200; padding: 16px;
  }
  .gacha-overlay.show { display: flex; }
  .gacha-card {
    background: white; border-radius: 20px; padding: 28px 24px; text-align: center;
    width: 100%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  }
  .gacha-title { color: #5a6a85; font-size: 14px; margin-bottom: 4px; }
  .gacha-number { font-size: 64px; font-weight: 800; margin: 8px 0; color: #4a7cff; }
  .gacha-number.spin { animation: gachaSpin 0.08s linear infinite; }
  .gacha-number.land { animation: gachaLand 0.4s ease; }
  @keyframes gachaSpin { from { transform: scale(1); } to { transform: scale(1.1); } }
  @keyframes gachaLand { 0% { transform: scale(0.4) rotate(-8deg); opacity: 0; } 60% { transform: scale(1.2) rotate(4deg); opacity: 1; } 100% { transform: scale(1) rotate(0); } }
  .gacha-rate { font-size: 13px; color: #5a6a85; margin-bottom: 10px; }
  .gacha-msg { font-size: 15px; min-height: 44px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="container">
  <div id="loginView" class="card" style="display:none; max-width:360px; margin:60px auto;">
    <h2 style="text-align:center;">로그인</h2>
    <input id="loginCode" placeholder="내 코드 입력 (4자리)" style="width:100%; text-align:center; font-size:24px; letter-spacing:4px;" maxlength="4" />
    <button style="width:100%; margin-top:10px;" onclick="login()">시작하기</button>
  </div>

  <div id="mainView" style="display:none;">
    <div class="topbar">
      <h1 id="greeting">안녕!</h1>
      <div class="links">
        <a href="index.html">나의 루틴</a>
        <a href="class-board.html">우리 반 보드</a>
        <a href="me.html">나의 통계</a>
        <a href="#" onclick="logout(); location.href='../index.html';">처음으로</a>
        <a href="#" onclick="logout()">로그아웃</a>
      </div>
    </div>
    <div id="pointsBar" style="margin-bottom:10px; font-size:14px; color:#5a6a85;"></div>
    <div id="encourageBanner"></div>
    <div id="routineList"></div>
  </div>
</div>

<div class="gacha-overlay" id="gachaOverlay">
  <div class="gacha-card">
    <div class="gacha-title">오늘의 행운 뽑기 🎁</div>
    <div class="gacha-number" id="gachaNumber">?</div>
    <div class="gacha-rate" id="gachaRate"></div>
    <div class="gacha-msg" id="gachaMsg"></div>
    <button onclick="closeGacha()">확인</button>
  </div>
</div>

<audio id="doneSound" preload="auto">
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=" type="audio/wav">
</audio>
<div class="toast" id="toast"></div>

<script src="../shared/api.js"></script>
<script>
let studentId = sessionStorage.getItem('studentId');
let classId = sessionStorage.getItem('studentClassId');
let stopPolling;

function showLogin() {
  document.getElementById('loginView').style.display = 'block';
  document.getElementById('mainView').style.display = 'none';
}
function showMain() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('mainView').style.display = 'block';
  document.getElementById('greeting').textContent = `안녕, ${sessionStorage.getItem('studentNickname')}!`;
  stopPolling = startPolling(loadToday, 7000);
  startPolling(loadEncouragements, 8000);
  startPolling(checkDraw, 10000);
  loadPoints();
}

const GACHA_MESSAGES = {
  normal: '오늘도 루틴을 했어요! 내일은 더 멋진 숫자가 나올 수 있어요 🌱',
  special: '오늘 루틴을 정말 많이 했군요! 그래서 특별한 숫자가 나왔어요 🎉✨'
};

async function checkDraw() {
  let draw;
  try {
    draw = await API.get(`/api/stats/draw?student_id=${studentId}`);
  } catch (e) { return; }
  if (!draw || !draw.number) return; // 아직 선생님이 하루 마감을 안 한 경우
  const seenKey = `gachaSeen_${studentId}_${draw.date}`;
  if (sessionStorage.getItem(seenKey)) return;
  sessionStorage.setItem(seenKey, '1');
  playGacha(draw);
}

function playGacha(draw) {
  const overlay = document.getElementById('gachaOverlay');
  const numberEl = document.getElementById('gachaNumber');
  const rateEl = document.getElementById('gachaRate');
  const msgEl = document.getElementById('gachaMsg');

  numberEl.classList.remove('land');
  numberEl.classList.add('spin');
  rateEl.textContent = `오늘 루틴을 ${Math.round(draw.rate * 100)}%만큼 했어요 · 루틴을 많이 할수록 좋은 숫자가 나와요`;
  msgEl.textContent = '';
  overlay.classList.add('show');

  let ticks = 0;
  const spin = setInterval(() => {
    numberEl.textContent = 1 + Math.floor(Math.random() * 5);
    ticks++;
    if (ticks > 14) {
      clearInterval(spin);
      numberEl.classList.remove('spin');
      numberEl.textContent = draw.number;
      numberEl.classList.add('land');
      msgEl.textContent = GACHA_MESSAGES[draw.tier] || '';
    }
  }, 70);
}

function closeGacha() {
  document.getElementById('gachaOverlay').classList.remove('show');
}

async function loadPoints() {
  const s = await API.get(`/api/students/${studentId}`);
  const stickers = '⭐'.repeat(Math.min(Math.floor((s.points || 0) / 5), 10));
  document.getElementById('pointsBar').textContent = `${s.points || 0}점  ${stickers}`;
}

async function loadEncouragements() {
  const list = await API.get(`/api/encouragements?student_id=${studentId}&unread_only=1`);
  const box = document.getElementById('encourageBanner');
  if (!list.length) { box.innerHTML = ''; return; }
  const m = list[0];
  box.innerHTML = `<div class="card" style="background:#fff7e0; border:1px solid #ffe2a0;">
    💌 ${m.message}
    <button class="secondary" style="margin-left:10px; font-size:12px; padding:4px 8px;" onclick="readEncouragement(${m.id})">확인</button>
  </div>`;
}

async function readEncouragement(id) {
  await API.post(`/api/encouragements/${id}/read`);
  loadEncouragements();
}

async function login() {
  const code = document.getElementById('loginCode').value.trim();
  if (!code) return;
  try {
    const s = await API.post('/api/students/login', { login_code: code });
    studentId = s.id;
    classId = s.class_id;
    sessionStorage.setItem('studentId', studentId);
    sessionStorage.setItem('studentClassId', classId);
    sessionStorage.setItem('studentNickname', s.nickname);
    showMain();
  } catch (e) {
    alert('코드를 다시 확인해주세요');
  }
}

function logout() {
  sessionStorage.clear();
  if (stopPolling) stopPolling();
  showLogin();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

async function loadToday() {
  const data = await API.get(`/api/checks/today?class_id=${classId}&student_id=${studentId}`);
  const slots = {};
  data.routines.forEach(r => {
    slots[r.time_slot] = slots[r.time_slot] || [];
    slots[r.time_slot].push(r);
  });

  const order = ['아침', '오전', '오후', '하루'];
  const keys = Object.keys(slots).sort((a, b) => order.indexOf(a) - order.indexOf(b));

  const list = document.getElementById('routineList');
  list.innerHTML = keys.map(slot => `
    <div class="slot-title">${slot}</div>
    ${slots[slot].map(r => {
      const done = r.check.completed;
      return `<div class="routine-item">
        <div class="icon">${r.icon}</div>
        <div class="title">
          ${r.title}${r.target_count > 1 ? ` (${r.check.count}/${r.target_count})` : ''}
          ${r.carried_over ? '<div style="font-size:13px; color:#c98a1e; margin-top:2px;">어제 못한 일이에요, 오늘 해볼까요?</div>' : ''}
          ${r.locked && !done ? `<div style="font-size:13px; color:#c0392b; margin-top:2px;">마감(${r.deadline_time}) 지났어요</div>` : ''}
        </div>
        <div class="check-btn ${done ? 'done' : ''} ${r.locked ? 'locked' : ''}" onclick="${r.locked ? '' : `toggle(${r.id}, this)`}">${done ? '✓' : (r.locked ? '🔒' : '')}</div>
      </div>`;
    }).join('')}
  `).join('');
}

async function toggle(routineId, el) {
  try {
    const res = await API.post('/api/checks/toggle', { routine_id: routineId, student_id: studentId });
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 200);
    if (res.completed) {
      document.getElementById('doneSound').play().catch(() => {});
      showToast('잘했어요! 완료했어요 🎉');
    }
    loadPoints();
  } catch (e) {
    alert(e.message);
  }
  loadToday();
}

if (studentId) showMain(); else showLogin();
</script>
</body>
</html>
