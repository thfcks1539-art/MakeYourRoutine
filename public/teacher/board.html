<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>전자칠판 모드</title>
<link rel="stylesheet" href="../shared/common.css" />
<style>
  body { background: #1f2430; color: white; }
  .container { max-width: 1400px; }
  h1 { font-size: 2.4rem; text-align: center; }
  .gauge-wrap { gap: 24px; }
  .gauge-bar { height: 40px; }
  #classGaugeLabel { font-size: 2rem; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 18px; }
  .student-card { background: #2b3142; color: white; cursor: pointer; transition: transform 0.15s; }
  .student-card:active { transform: scale(0.96); }
  .student-card .ring span { background: #2b3142; color: white; }
  .msg { color: #b9c4dd !important; }
  a.back { color: #8fa3ff; }
  @media (max-width: 600px) {
    h1 { font-size: 1.6rem; }
    #classGaugeLabel { font-size: 1.4rem; }
  }

  .overlay {
    position: fixed; inset: 0; background: rgba(10,12,18,0.78);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .overlay.show { display: flex; }
  .overlay .card { background: #2b3142; color: white; width: 100%; max-width: 380px; text-align: center; }
  .overlay h2 { font-size: 1.6rem; }
  .overlay input {
    width: 100%; text-align: center; font-size: 28px; letter-spacing: 6px;
    background: #1f2430; color: white; border: 1px solid #3c455c;
  }
  .overlay .actions { display: flex; gap: 10px; margin-top: 12px; }
  .overlay .actions button { flex: 1; }

  .tabbar { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab-btn { background: #3c455c; color: #cdd5e6; }
  .tab-btn.active { background: #4a7cff; color: white; }
  .routine-stat-item {
    background: #2b3142; border-radius: 12px; padding: 14px 18px;
    margin-bottom: 10px; display: flex; align-items: center; gap: 14px;
  }
  .routine-stat-item .icon { font-size: 26px; }
  .routine-stat-item .info { flex: 1; }
  .routine-stat-item .title { font-size: 16px; margin-bottom: 6px; }
  .routine-stat-item .bar { height: 14px; background: #3c455c; border-radius: 7px; overflow: hidden; }
  .routine-stat-item .bar-fill { height: 100%; background: linear-gradient(90deg, #7bd389, #4a7cff); }
  .routine-stat-item .pct { font-weight: bold; min-width: 64px; text-align: right; }

  #routineView { display: none; }
  #routineView .topbar h1 { font-size: 1.8rem; text-align: left; }
  #routineView .routine-item { background: #2b3142; color: white; box-shadow: none; }
  #routineView .slot-title { color: #b9c4dd; margin: 18px 0 8px; font-size: 15px; font-weight: 600; }
  #routineView .check-btn { background: #3c455c; color: #cdd5e6; }
  #routineView .check-btn.done { background: #4ad07a; color: white; }
  #backToBoard { background: #3c455c; }
</style>
</head>
<body>
<div class="container">
  <div id="boardView">
    <a class="back" href="index.html">&larr; 대시보드</a>
    <h1 id="className">우리 반 오늘의 루틴</h1>
    <div class="card" style="background:#2b3142;">
      <div class="gauge-wrap">
        <div class="gauge-bar"><div class="gauge-fill" id="classGaugeFill" style="width:0%"></div></div>
        <strong id="classGaugeLabel">0%</strong>
      </div>
      <p id="rewardText" style="color:#b9c4dd;"></p>
    </div>
    <div class="tabbar">
      <button class="tab-btn active" id="tabStudents" onclick="switchTab('students')">학생별 보드</button>
      <button class="tab-btn" id="tabRoutines" onclick="switchTab('routines')">루틴별 통계</button>
    </div>
    <div class="grid" id="studentGrid"></div>
    <div id="routineStatsGrid" style="display:none;"></div>
  </div>

  <div id="routineView">
    <div class="topbar">
      <h1 id="routineGreeting">안녕!</h1>
      <button id="backToBoard" onclick="backToBoard()">반 전체 화면으로</button>
    </div>
    <div id="routineList"></div>
  </div>
</div>

<div class="overlay" id="codeOverlay">
  <div class="card">
    <h2 id="codeOverlayName">코드를 입력해주세요</h2>
    <input id="codeInput" placeholder="내 코드 (4자리)" maxlength="4" inputmode="numeric" />
    <div class="actions">
      <button class="secondary" onclick="closeCodeOverlay()">취소</button>
      <button onclick="submitCode()">확인</button>
    </div>
  </div>
</div>

<audio id="doneSound" preload="auto">
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=" type="audio/wav">
</audio>
<div class="toast" id="toast"></div>

<script src="../shared/api.js"></script>
<script>
const classId = sessionStorage.getItem('teacherClassId');
if (!classId) location.href = 'index.html';

let stopBoardPolling = null;
let stopRoutinePolling = null;
let pendingStudent = null;
let activeStudentId = null;

async function loadBoard() {
  const cls = await API.get(`/api/classes/${classId}`);
  document.getElementById('className').textContent = cls.name + ' 오늘의 루틴';
  document.getElementById('rewardText').textContent = cls.reward_text ? `🎁 목표 달성 시: ${cls.reward_text}` : '';

  const data = await API.get(`/api/stats/dashboard?class_id=${classId}`);
  const pct = Math.round(data.class_rate * 100);
  document.getElementById('classGaugeFill').style.width = pct + '%';
  document.getElementById('classGaugeLabel').textContent = pct + '%';

  const grid = document.getElementById('studentGrid');
  grid.innerHTML = data.students.map(s => {
    const rate = Math.round(s.rate * 100);
    return `<div class="student-card" onclick="openCodeOverlay(${s.student_id}, '${s.nickname.replace(/'/g, "\\'")}')">
      <div class="ring" style="--rate:${rate}"><span>${rate}%</span></div>
      <div>${s.nickname}</div>
      <div class="msg">${s.message || ''}</div>
    </div>`;
  }).join('');

  renderRoutineStats(data.students);
}

function computeRoutineStats(students) {
  const map = new Map();
  students.forEach(s => {
    (s.routines || []).forEach(r => {
      if (!map.has(r.routine_id)) {
        map.set(r.routine_id, { title: r.title, icon: r.icon, total: 0, completed: 0 });
      }
      const e = map.get(r.routine_id);
      e.total++;
      if (r.completed) e.completed++;
    });
  });
  return Array.from(map.values()).sort((a, b) => (b.completed / b.total) - (a.completed / a.total));
}

function renderRoutineStats(students) {
  const stats = computeRoutineStats(students);
  const el = document.getElementById('routineStatsGrid');
  if (!stats.length) {
    el.innerHTML = '<p style="color:#b9c4dd;">표시할 루틴이 없어요</p>';
    return;
  }
  el.innerHTML = stats.map(s => {
    const pct = Math.round((s.completed / s.total) * 100);
    return `<div class="routine-stat-item">
      <div class="icon">${s.icon}</div>
      <div class="info">
        <div class="title">${s.title}</div>
        <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="pct">${s.completed}/${s.total} (${pct}%)</div>
    </div>`;
  }).join('');
}

function switchTab(tab) {
  document.getElementById('tabStudents').classList.toggle('active', tab === 'students');
  document.getElementById('tabRoutines').classList.toggle('active', tab === 'routines');
  document.getElementById('studentGrid').style.display = tab === 'students' ? 'grid' : 'none';
  document.getElementById('routineStatsGrid').style.display = tab === 'routines' ? 'block' : 'none';
}

function openCodeOverlay(studentId, nickname) {
  pendingStudent = { id: studentId, nickname };
  document.getElementById('codeOverlayName').textContent = `${nickname}, 내 코드를 입력해줘`;
  document.getElementById('codeInput').value = '';
  document.getElementById('codeOverlay').classList.add('show');
  document.getElementById('codeInput').focus();
}

function closeCodeOverlay() {
  pendingStudent = null;
  document.getElementById('codeOverlay').classList.remove('show');
}

async function submitCode() {
  const code = document.getElementById('codeInput').value.trim();
  if (!code || !pendingStudent) return;
  try {
    const s = await API.post('/api/students/login', { login_code: code });
    if (s.id !== pendingStudent.id) {
      alert('코드가 일치하지 않아요. 본인 카드를 다시 눌러주세요.');
      return;
    }
    closeCodeOverlay();
    enterRoutineView(s.id, s.nickname);
  } catch (e) {
    alert('코드를 다시 확인해주세요');
  }
}

function enterRoutineView(studentId, nickname) {
  activeStudentId = studentId;
  if (stopBoardPolling) { stopBoardPolling(); stopBoardPolling = null; }
  document.getElementById('boardView').style.display = 'none';
  document.getElementById('routineView').style.display = 'block';
  document.getElementById('routineGreeting').textContent = `안녕, ${nickname}!`;
  stopRoutinePolling = startPolling(loadToday, 7000);
}

function backToBoard() {
  activeStudentId = null;
  if (stopRoutinePolling) { stopRoutinePolling(); stopRoutinePolling = null; }
  document.getElementById('routineView').style.display = 'none';
  document.getElementById('boardView').style.display = 'block';
  stopBoardPolling = startPolling(loadBoard, 5000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

async function loadToday() {
  if (!activeStudentId) return;
  const data = await API.get(`/api/checks/today?class_id=${classId}&student_id=${activeStudentId}`);
  const slots = {};
  data.routines.forEach(r => {
    slots[r.time_slot] = slots[r.time_slot] || [];
    slots[r.time_slot].push(r);
  });

  const order = ['아침', '오전', '오후', '하루'];
  const keys = Object.keys(slots).sort((a, b) => order.indexOf(a) - order.indexOf(b));

  const list = document.getElementById('routineList');
  list.innerHTML = keys.map(slot => `
    <div class="slot-title">${slot}</div>
    ${slots[slot].map(r => {
      const done = r.check.completed;
      return `<div class="routine-item">
        <div class="icon">${r.icon}</div>
        <div class="title">
          ${r.title}${r.target_count > 1 ? ` (${r.check.count}/${r.target_count})` : ''}
          ${r.carried_over ? '<div style="font-size:13px; color:#e0b25a; margin-top:2px;">어제 못한 일이에요, 오늘 해볼까요?</div>' : ''}
          ${r.locked && !done ? `<div style="font-size:13px; color:#ff8a7a; margin-top:2px;">마감(${r.deadline_time}) 지났어요</div>` : ''}
        </div>
        <div class="check-btn ${done ? 'done' : ''} ${r.locked ? 'locked' : ''}" onclick="${r.locked ? '' : `toggle(${r.id}, this)`}">${done ? '✓' : (r.locked ? '🔒' : '')}</div>
      </div>`;
    }).join('')}
  `).join('');
}

async function toggle(routineId, el) {
  try {
    const res = await API.post('/api/checks/toggle', { routine_id: routineId, student_id: activeStudentId });
    el.classList.add('bump');
    setTimeout(() => el.classList.remove('bump'), 200);
    if (res.completed) {
      document.getElementById('doneSound').play().catch(() => {});
      showToast('잘했어요! 완료했어요 🎉');
    }
  } catch (e) {
    alert(e.message);
  }
  loadToday();
}

stopBoardPolling = startPolling(loadBoard, 5000);
</script>
</body>
</html>
