<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>루틴 관리</title>
<link rel="stylesheet" href="../shared/common.css" />
</head>
<body>
<div class="container">
  <a href="index.html">&larr; 대시보드로</a>
  <h1>루틴 관리</h1>

  <div class="card">
    <div style="display:flex; gap:8px; margin-bottom:14px;">
      <button id="modeRoutineBtn" onclick="setMode('routine')" style="flex:1;">📅 반복 루틴</button>
      <button id="modeTaskBtn" onclick="setMode('task')" class="secondary" style="flex:1;">✏️ 오늘의 할일</button>
    </div>
    <h2 id="formTitle">새 루틴 만들기</h2>
    <div style="display:flex; flex-wrap:wrap; gap:8px;">
      <input id="rTitle" placeholder="루틴 이름 (예: 책 읽기)" />
      <input id="rIcon" placeholder="아이콘 (예: 📖)" style="width:80px" />
      <select id="rTimeSlot">
        <option value="아침">아침</option>
        <option value="오전">오전</option>
        <option value="오후" selected>오후</option>
        <option value="하루">하루 종일</option>
      </select>
      <input id="rTarget" type="number" min="1" value="1" placeholder="목표 횟수" style="width:90px" />
      <input id="rStart" type="time" title="이 시간 이전에는 체크할 수 없어요" style="width:140px" />
      <input id="rDeadline" type="time" title="이 시간 이후에는 체크할 수 없어요" style="width:140px" />
      <select id="rStudent"><option value="">공통 (전체 학생)</option></select>
    </div>
    <div id="dowRow" style="margin-top:8px;">
      요일:
      <label><input type="checkbox" class="dow" value="1" checked>월</label>
      <label><input type="checkbox" class="dow" value="2" checked>화</label>
      <label><input type="checkbox" class="dow" value="3" checked>수</label>
      <label><input type="checkbox" class="dow" value="4" checked>목</label>
      <label><input type="checkbox" class="dow" value="5" checked>금</label>
      <label><input type="checkbox" class="dow" value="6" checked>토</label>
      <label><input type="checkbox" class="dow" value="0" checked>일</label>
    </div>
    <div id="taskDateRow" style="margin-top:8px; display:none;">
      📅 날짜: <input id="rTaskDate" type="date" style="width:160px;" />
      <span style="font-size:13px; color:var(--color-silver); margin-left:6px;">해당 날 하루만 학생에게 표시돼요</span>
    </div>
    <div style="margin-top:10px;">
      <label style="display:block; font-size:13px; color:var(--color-graphite); margin-bottom:4px;">제외할 학생 (체크한 학생에게는 이 루틴이 보이지 않아요)</label>
      <div id="excludeList" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
    </div>
    <div style="margin-top:10px; display:flex; gap:8px;">
      <button id="saveBtn" onclick="saveRoutine()">루틴 추가</button>
      <button id="cancelEditBtn" class="secondary" style="display:none;" onclick="cancelEdit()">수정 취소</button>
    </div>
  </div>

  <div class="card">
    <h2>루틴 목록</h2>
    <div class="table-scroll"><table id="routineTable" class="student-table"></table></div>
  </div>
</div>

<script src="../shared/api.js"></script>
<script>
const classId = sessionStorage.getItem('teacherClassId');
if (!classId) location.href = 'index.html';

const DOW_LABEL = { 0:'일',1:'월',2:'화',3:'수',4:'목',5:'금',6:'토' };

let studentsCache = [];

async function loadStudentOptions() {
  studentsCache = await API.get(`/api/students?class_id=${classId}`);
  const sel = document.getElementById('rStudent');
  studentsCache.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = `${s.nickname} (개인 루틴)`;
    sel.appendChild(opt);
  });

  const excludeList = document.getElementById('excludeList');
  excludeList.innerHTML = studentsCache.map(s => `
    <label style="display:flex; align-items:center; gap:4px; font-size:14px;">
      <input type="checkbox" class="exclude-student" value="${s.id}">${s.nickname}
    </label>
  `).join('');
}

let editingId = null;
let routinesCache = [];
let currentMode = 'routine'; // 'routine' | 'task'

function setMode(mode) {
  currentMode = mode;
  const isTask = mode === 'task';
  document.getElementById('dowRow').style.display = isTask ? 'none' : '';
  document.getElementById('taskDateRow').style.display = isTask ? '' : 'none';
  document.getElementById('modeRoutineBtn').className = isTask ? 'secondary' : '';
  document.getElementById('modeTaskBtn').className = isTask ? '' : 'secondary';
  if (isTask) {
    // 날짜 기본값을 오늘로
    if (!document.getElementById('rTaskDate').value) {
      document.getElementById('rTaskDate').value = new Date().toISOString().slice(0, 10);
    }
    document.getElementById('formTitle').textContent = editingId ? '할일 수정' : '새 할일 만들기';
    document.getElementById('saveBtn').textContent = editingId ? '수정 완료' : '할일 추가';
  } else {
    document.getElementById('formTitle').textContent = editingId ? '루틴 수정' : '새 루틴 만들기';
    document.getElementById('saveBtn').textContent = editingId ? '수정 완료' : '루틴 추가';
  }
}

function resetForm() {
  document.getElementById('rTitle').value = '';
  document.getElementById('rIcon').value = '';
  document.getElementById('rTimeSlot').value = '오후';
  document.getElementById('rTarget').value = 1;
  document.getElementById('rStart').value = '';
  document.getElementById('rDeadline').value = '';
  document.getElementById('rStudent').value = '';
  document.getElementById('rTaskDate').value = '';
  document.querySelectorAll('.dow').forEach(c => c.checked = true);
  document.querySelectorAll('.exclude-student').forEach(c => c.checked = false);
}

function cancelEdit() {
  editingId = null;
  resetForm();
  setMode('routine');
  document.getElementById('cancelEditBtn').style.display = 'none';
}

function editRoutine(id) {
  const r = routinesCache.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('rTitle').value = r.title;
  document.getElementById('rIcon').value = r.icon;
  document.getElementById('rTimeSlot').value = r.time_slot;
  document.getElementById('rTarget').value = r.target_count;
  document.getElementById('rStart').value = r.start_time || '';
  document.getElementById('rDeadline').value = r.deadline_time || '';
  document.getElementById('rStudent').value = r.student_id || '';
  const excluded = (r.excluded_student_ids || []).map(String);
  document.querySelectorAll('.exclude-student').forEach(c => { c.checked = excluded.includes(c.value); });
  document.getElementById('cancelEditBtn').style.display = 'inline-block';

  if (r.task_date) {
    document.getElementById('rTaskDate').value = r.task_date;
    setMode('task');
  } else {
    const days = (r.days_of_week || '').split(',');
    document.querySelectorAll('.dow').forEach(c => { c.checked = days.includes(c.value); });
    setMode('routine');
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function saveRoutine() {
  const title = document.getElementById('rTitle').value.trim();
  if (!title) return alert('이름을 입력하세요');
  const icon = document.getElementById('rIcon').value.trim() || '✅';
  const time_slot = document.getElementById('rTimeSlot').value;
  const target_count = Number(document.getElementById('rTarget').value) || 1;
  const start_time = document.getElementById('rStart').value || null;
  const deadline_time = document.getElementById('rDeadline').value || null;
  const studentId = document.getElementById('rStudent').value || null;
  if (start_time && deadline_time && start_time >= deadline_time) return alert('시작 시간은 마감 시간보다 빨라야 해요');
  const excludedIds = Array.from(document.querySelectorAll('.exclude-student:checked')).map(c => Number(c.value));

  let task_date = null;
  let days_of_week = null;
  if (currentMode === 'task') {
    task_date = document.getElementById('rTaskDate').value;
    if (!task_date) return alert('날짜를 선택하세요');
  } else {
    days_of_week = Array.from(document.querySelectorAll('.dow:checked')).map(c => c.value).join(',');
    if (!days_of_week) return alert('요일을 하나 이상 선택하세요');
  }

  try {
    let routineId = editingId;
    if (editingId) {
      await API.put(`/api/routines/${editingId}`, { title, icon, time_slot, target_count, start_time, deadline_time, days_of_week, task_date });
    } else {
      const created = await API.post('/api/routines', {
        class_id: classId, student_id: studentId,
        title, icon, time_slot, target_count, start_time, deadline_time, days_of_week, task_date
      });
      routineId = created.id;
    }
    await API.put(`/api/routines/${routineId}/exclusions`, { student_ids: excludedIds });
  } catch (e) {
    return alert(e.message);
  }
  cancelEdit();
  loadRoutines();
}

async function loadRoutines() {
  const routines = await API.get(`/api/routines?class_id=${classId}`);
  routinesCache = routines;
  const table = document.getElementById('routineTable');
  table.innerHTML = '<tr><th>아이콘</th><th>이름</th><th>종류</th><th>시간대</th><th>요일/날짜</th><th>목표</th><th>시작</th><th>마감</th><th>대상</th><th>제외</th><th></th></tr>' +
    routines.map(r => `<tr>
      <td>${r.icon}</td>
      <td>${r.title}</td>
      <td>${r.task_date ? '<span style="background:#e8f4ff; color:#2980b9; font-size:12px; font-weight:700; padding:2px 8px; border-radius:8px;">할일</span>' : '루틴'}</td>
      <td>${r.time_slot}</td>
      <td>${r.task_date ? r.task_date : (r.days_of_week || '').split(',').map(d => DOW_LABEL[d]).join(' ')}</td>
      <td>${r.target_count}</td>
      <td>${r.start_time || '-'}</td>
      <td>${r.deadline_time || '-'}</td>
      <td>${r.student_id ? '개인' : '전체'}</td>
      <td>${(r.excluded_student_ids || []).length ? `${r.excluded_student_ids.length}명` : '-'}</td>
      <td>
        <button class="secondary" onclick="editRoutine(${r.id})">수정</button>
        <button class="secondary" onclick="removeRoutine(${r.id})">삭제</button>
      </td>
    </tr>`).join('');
}

async function removeRoutine(id) {
  if (!confirm('이 루틴을 삭제할까요?')) return;
  await API.del(`/api/routines/${id}`);
  loadRoutines();
}

loadStudentOptions();
loadRoutines();
</script>
</body>
</html>
